<!DOCTYPE html>
<html>
<head>
  <title>Student Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      background: white;
    }

    .title {
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .btn-custom {
      border-radius: 8px;
      padding: 10px;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 38px;
      cursor: pointer;
    }

    .input-group {
      position: relative;
    }
  </style>
</head>

<body>

<div class="login-card">

  <h3 class="text-center title">👨‍🎓 Student Login</h3>
  <p class="text-center subtitle">Access your placement dashboard</p>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">
          {{ message }}
          <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="/login_student" method="post">

    <div class="mb-3">
      <label>Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3 input-group">
      <label>Password</label>
      <input type="password" id="password" name="password" class="form-control" required>
      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button type="submit" class="btn btn-primary w-100 btn-custom">Login</button>

  </form>

  <div class="text-center mt-3">
    <a href="/" class="text-decoration-none">⬅ Back to Home</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword() {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
