{% extends "base.html" %}

{% block content %}

</div>

<!-- ===================== STATS ===================== -->
<div class="row g-4 mb-4">

  <div class="col-md-3">
    <div class="card text-white bg-primary shadow">
      <div class="card-body text-center">
        <h6>Total Students</h6>
        <h2>{{ stats[0] }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card text-white bg-success shadow">
      <div class="card-body text-center">
        <h6>Total Companies</h6>
        <h2>{{ stats[1] }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card text-white bg-warning shadow">
      <div class="card-body text-center">
        <h6>Total Applications</h6>
        <h2>{{ stats[3] }}</h2>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card text-white bg-danger shadow">
      <div class="card-body text-center">
        <h6>Total Drives</h6>
        <h2>{{ stats[2] }}</h2>
      </div>
    </div>
  </div>

</div>

<!-- ===================== ACTION BUTTONS ===================== -->
<div class="row g-4">

  <div class="col-md-4">
    <a href="/view_companies" class="btn btn-outline-primary w-100 p-3 shadow-sm">
      🏢 View Companies
    </a>
  </div>

  <div class="col-md-4">
    <a href="/view_students" class="btn btn-outline-success w-100 p-3 shadow-sm">
      👨‍🎓 View Students
    </a>
  </div>

  <div class="col-md-4">
    <a href="/add_company" class="btn btn-outline-warning w-100 p-3 shadow-sm">
      ➕ Add Company
    </a>
  </div>

  <div class="col-md-4">
    <a href="/create_drive" class="btn btn-outline-danger w-100 p-3 shadow-sm">

    </a>
  </div>

  <div class="col-md-4">
    <a href="/view_drives_admin" class="btn btn-outline-dark w-100 p-3 shadow-sm">
      📊 View Drives & Applicants
    </a>
  </div>

</div>

{% endblock %}
